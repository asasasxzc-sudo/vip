<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云茗荟 · 智赢全球 | YMTEA CLUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #e4e4e7; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #c2410c 0%, #7c2d12 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(194, 65, 12, 0.5); background: rgba(255, 255, 255, 0.04); transform: translateY(-5px); }
        .typing-effect { border-right: 2px solid #c2410c; animation: caret 1s steps(1) infinite; }
        @keyframes caret { 50% { border-color: transparent; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [product, setProduct] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            // 增强版：生成随机动态专业分析内容
            const generateProfessionalAnalysis = (keyword) => {
                const markets = ["北美中心区", "西欧高端商圈", "东南亚新兴市场", "中东高净值地区"];
                const difficulty = ["中等偏高 (B+)", "极具潜力 (A)", "蓝海竞争 (A-)", "高难度拦截 (S)"];
                const metrics = [
                    "SEO 关键词拦截率建议 45% 以上",
                    "GEO 内容权重需向 LinkedIn 矩阵倾斜",
                    "独立站 UI 建议采用高质感工业风",
                    "建议配置 7x24h 智能询盘路由"
                ];
                
                const randomMarket = markets[Math.floor(Math.random() * markets.length)];
                const randomDiff = difficulty[Math.floor(Math.random() * difficulty.length)];
                const randomMetric = metrics[Math.floor(Math.random() * metrics.length)];
                const randomScore = (Math.random() * (9.8 - 7.5) + 7.5).toFixed(1);

                return {
                    summary: `针对“${keyword}”的全球 SEO 深度扫描已完成。`,
                    details: [
                        `核心目标：${randomMarket}`,
                        `竞争难度：${randomDiff}`,
                        `YMTEA 潜力评分：${randomScore} / 10`,
                        `策略建议：${randomMetric}`
                    ],
                    action: "该品类在独立站端存在高转化长尾词空白，建议立即启动云茗荟 B2B 矩阵进行精准拦截。"
                };
            };

            const runAnalysis = async () => {
                if(!product.trim()) return;
                setLoading(true);
                setResult(null);
                
                try {
                    const response = await fetch('https://c.ymtea.club', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ product, type: 'vip_analysis' })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // 结合动态生成内容，让界面更专业
                        const proData = generateProfessionalAnalysis(product);
                        setResult({ ...data, pro: proData });
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    // 降级演示逻辑
                    const proData = generateProfessionalAnalysis(product);
                    setResult({ pro: proData });
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 导航栏 */}
                    <nav className="p-6 border-b border-white/5 flex justify-between items-center bg-black/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-8">
                            <a href="https://ymtea.club" target="_blank" className="text-xl font-black tracking-tighter text-white hover:text-orange-500 transition-colors">
                                云茗荟 <span className="text-orange-600">YMTEA</span>
                            </a>
                        </div>
                        <div className="flex gap-4 md:gap-8 text-[10px] uppercase tracking-[0.2em] font-bold">
                            <a href="https://www.ymtea.club/bbs/" target="_blank" className="text-orange-500 hover:scale-105 transition-transform">云茗荟论坛</a>
                            <a href="#benefits" className="hover:text-orange-500 hidden md:block">会员权益</a>
                            <a href="https://up.ymtea.club" target="_blank" className="border border-white/20 px-3 py-1 rounded hover:bg-white hover:text-black transition-all">行业分析</a>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="py-20 px-6 text-center">
                        <h1 className="text-5xl md:text-8xl font-black text-white mb-8 tracking-tight">煮茶论道，<br/><span className="text-orange-700">智赢全球</span></h1>
                        <p className="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed">
                            因为懂 SEO，所以更懂你需要什么。<br/>
                            构建全球品牌阵地，云茗荟出口十余年，用最真实的数据说话。
                        </p>
                    </header>

                    {/* AI 分析区 */}
                    <section id="lab" className="max-w-4xl mx-auto py-12 px-6 w-full">
                        <div className="bg-zinc-900/40 border border-white/10 p-8 md:p-12 rounded-[2.5rem] shadow-2xl">
                            <h2 className="text-2xl font-black text-white mb-2 text-center tracking-widest uppercase italic">AI Market Terminal</h2>
                            <p className="text-center text-[10px] text-orange-600 mb-10 font-bold tracking-[0.3em]">DATA DRIVEN BY YMTEA LABS</p>
                            
                            <div className="flex flex-col md:flex-row gap-3">
                                <input 
                                    className="flex-1 bg-black border border-white/10 p-5 outline-none focus:border-orange-700 text-white rounded-2xl transition-all"
                                    placeholder="输入关键词，例如：Ceramic Tea Set"
                                    value={product}
                                    onChange={(e) => setProduct(e.target.value)}
                                />
                                <button onClick={runAnalysis} className="bg-orange-700 px-10 py-5 font-black text-white rounded-2xl hover:bg-orange-600 transition-all uppercase tracking-widest">
                                    {loading ? 'ANALYZING...' : '启动分析'}
                                </button>
                            </div>

                            {result && result.pro && (
                                <div className="mt-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl">
                                        <div className="flex items-center gap-2 mb-6">
                                            <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                            <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">终端实时报告已就绪</span>
                                        </div>
                                        
                                        <p className="text-white text-xl font-bold mb-6">{result.pro.summary}</p>
                                        
                                        <div className="grid md:grid-cols-2 gap-4 mb-8">
                                            {result.pro.details.map((detail, idx) => (
                                                <div key={idx} className="bg-black/50 p-4 rounded-xl border border-white/5 text-sm">
                                                    <span className="text-orange-600 mr-2">▶</span> {detail}
                                                </div>
                                            ))}
                                        </div>

                                        <p className="text-gray-400 text-sm leading-relaxed mb-8 border-l-2 border-orange-700 pl-4">
                                            {result.pro.action}
                                        </p>

                                        <div className="text-center">
                                            <a href="https://up.ymtea.club" target="_blank" className="bg-white text-black px-10 py-4 rounded-full font-black text-xs hover:bg-orange-700 hover:text-white transition-all inline-block uppercase tracking-widest">
                                                获取完整行业报告数据 (PDF)
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* 6个会员福利板块 */}
                    <section id="benefits" className="max-w-6xl mx-auto py-24 px-6">
                        <h2 className="text-center text-3xl font-black text-white mb-16 tracking-widest uppercase">会员专属权益与赋能</h2>
                        
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-700 font-black mb-4 tracking-tighter text-2xl">01</div>
                                <h4 className="text-white font-bold mb-3">极致的能力</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">提供核心行业链接、商务引擎驱动及精准供需匹配，打破跨境信息壁垒。</p>
                            </div>
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-700 font-black mb-4 tracking-tighter text-2xl">02</div>
                                <h4 className="text-white font-bold mb-3">100% 独立站定制</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">UI 风格与输出逻辑全为 ToB 外贸询盘场景深度调优，转化率提升显著。</p>
                            </div>
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-700 font-black mb-4 tracking-tighter text-2xl">03</div>
                                <h4 className="text-white font-bold mb-3">SEO/GEO 深度优化</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">基于深度内容矩阵拦截高质流量，告别盲目烧钱，构建私域资产。</p>
                            </div>
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-600 font-black mb-4 tracking-tighter text-2xl">04</div>
                                <h4 className="text-white font-bold mb-3">宋代点茶体验</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">每周 6 天高端茶圈活动，体验非遗点茶美学。在茶香中完成千万级项目对撞。</p>
                            </div>
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-600 font-black mb-4 tracking-tighter text-2xl">05</div>
                                <h4 className="text-white font-bold mb-3">门店免品权</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">会员每日可到全球任意云茗荟门店免费品茶，享受专属商务接待空间。</p>
                            </div>
                            <div className="p-8 glass-card rounded-3xl">
                                <div className="text-orange-600 font-black mb-4 tracking-tighter text-2xl">06</div>
                                <h4 className="text-white font-bold mb-3">同享物流渠道</h4>
                                <p className="text-xs text-gray-500 leading-relaxed">开放云茗荟沉淀十余年的稳定、快速、透明物流体系，保障出海履约。</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="mt-auto py-16 border-t border-white/5 px-6">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div className="flex gap-8 text-[10px] font-black tracking-[0.2em] uppercase">
                                <a href="https://ymtea.club" target="_blank" className="hover:text-orange-500">官网</a>
                                <a href="https://www.ymtea.club/bbs/" target="_blank" className="hover:text-orange-500">论坛</a>
                                <a href="https://ymtea.club/blog" target="_blank" className="hover:text-orange-500">资讯</a>
                            </div>
                            <div className="text-[9px] text-gray-600 tracking-[0.3em] text-center md:text-right uppercase">
                                © 2026 YMTEA LABS · Global Market Data Terminal
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
