<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云茗荟 · 会员俱乐部 | YMTEA CLUB</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #e4e4e7; }
        .gold-gradient { background: linear-gradient(135deg, #c2410c 0%, #7c2d12 100%); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [product, setProduct] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const runAnalysis = async () => {
                if(!product) return;
                setLoading(true);
                try {
                    // 这里填写你部署的 Worker URL
                    const response = await fetch('https://c.ymtea.club', {
                        method: 'POST',
                        body: JSON.stringify({ product, country: 'Global' })
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (e) {
                    alert('分析引擎启动中，请稍后再试');
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="p-6 border-b border-white/5 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="text-xl font-black tracking-tighter text-white">云茗荟 <span className="text-orange-600">YMTEA</span></div>
                        <div className="flex gap-6 text-sm">
                            <a href="#benefits" className="hover:text-orange-500">会员权益</a>
                            <a href="#lab" className="hover:text-orange-500">AI 实验室</a>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="py-24 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-black text-white mb-8 tracking-tight">煮茶论道，<br/><span className="text-orange-700">智赢全球</span></h1>
                        <p className="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed">
                            一个融合了非遗文化美学与现代出海技术的顶层社交圈层。
                        </p>
                    </header>

                    {/* Benefits Section */}
                    <section id="benefits" className="max-w-6xl mx-auto py-20 px-6 grid md:grid-cols-3 gap-8">
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🍵</div>
                            <h3 className="text-xl font-bold text-white mb-3">宋代点茶 · 非遗体验</h3>
                            <p className="text-sm text-gray-400 leading-loose">会员免费体验“七汤点茶”，在沫饽翻涌间领略宋式极致美学，学茶道，定心神。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🔪</div>
                            <h3 className="text-xl font-bold text-white mb-3">耀州窑刻花 · 手作</h3>
                            <p className="text-sm text-gray-400 leading-loose">非遗传承人亲自指导，在泥坯上勾勒宋纹，每一件刻花作品都是会员身份的徽章。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🤝</div>
                            <h3 className="text-xl font-bold text-white mb-3">资源互关 · 生意对接</h3>
                            <p className="text-sm text-gray-400 leading-loose">对接海内外优质生意项目，学习独立站建立与SEO优化。高端茶圈分享，资源精准匹配。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🃏</div>
                            <h3 className="text-xl font-bold text-white mb-3">掼蛋桌游 · 轻松社交</h3>
                            <p className="text-sm text-gray-400 leading-loose">会员免费提供专业桌游与掼蛋空间。在轻松的对弈中，完成千万级项目的初步碰撞。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🚢</div>
                            <h3 className="text-xl font-bold text-white mb-3">共享物流 · 扬帆远航</h3>
                            <p className="text-sm text-gray-400 leading-loose">共享云茗荟自有海外运输渠道，打破物流壁垒，为会员企业的出海降本增效。</p>
                        </div>
                        <div className="p-8 gold-gradient flex flex-col justify-center items-center text-center">
                            <h3 className="text-2xl font-bold text-white mb-4">立即加入</h3>
                            <p className="text-white/80 text-sm mb-6">获取完整会员权益清单</p>
                            <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" className="bg-white text-orange-900 px-6 py-2 font-bold rounded-full">联系主理人</a>
                        </div>
                    </section>

                    {/* AI Lab Section */}
                    <section id="lab" className="max-w-4xl mx-auto py-32 px-6">
                        <div className="bg-zinc-900/50 border border-white/10 p-12 rounded-3xl text-center">
                            <h2 className="text-3xl font-bold text-white mb-6">AI 出海实验室 (Beta)</h2>
                            <p className="text-gray-400 mb-8">输入您的产品，获取云茗荟专有的全球市场 SEO 分析数据</p>
                            <div className="flex gap-2">
                                <input 
                                    className="flex-1 bg-black border border-white/10 p-4 outline-none focus:border-orange-700 transition-all"
                                    placeholder="输入产品关键词..."
                                    value={product}
                                    onChange={(e) => setProduct(e.target.value)}
                                />
                                <button 
                                    onClick={runAnalysis}
                                    className="bg-orange-700 px-8 font-bold hover:bg-orange-600 transition-all"
                                >
                                    {loading ? '分析中...' : '启动分析'}
                                </button>
                            </div>

                            {result && (
                                <div className="mt-8 text-left grid md:grid-cols-2 gap-4 border-t border-white/10 pt-8">
                                    <div className="p-4 bg-black/40">
                                        <p className="text-xs text-orange-500 font-bold uppercase">需求热度</p>
                                        <p className="text-2xl text-white">{result.demand}</p>
                                    </div>
                                    <div className="p-4 bg-black/40">
                                        <p className="text-xs text-orange-500 font-bold uppercase">B2B 策略</p>
                                        <p className="text-sm text-gray-300">{result.strategy.b2b}</p>
                                    </div>
                                    <div className="col-span-full p-4 bg-orange-700/10 border border-orange-700/20">
                                        <p className="text-xs text-orange-500 font-bold">💡 云茗荟独家建议</p>
                                        <p className="text-sm italic">{result.memberBenefit}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    <footer className="py-20 text-center border-t border-white/5 text-gray-600 text-xs">
                        <p>© 2026 云茗荟会员俱乐部 · 智联全球商业生态</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
