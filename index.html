<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云茗荟 · 会员俱乐部 | YMTEA CLUB</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #e4e4e7; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #c2410c 0%, #7c2d12 100%); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [product, setProduct] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const runAnalysis = async () => {
                if(!product) return;
                setLoading(true);
                try {
                    // 已修正：删除了多余的符号，保留正确的 fetch 格式
                    const response = await fetch('https://c.ymtea.club', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ product, country: 'Global' })
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (e) {
                    console.error(e);
                    alert('分析引擎启动中，请稍后再试');
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen">
                    <nav className="p-6 border-b border-white/5 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="text-xl font-black tracking-tighter text-white">云茗荟 <span className="text-orange-600">YMTEA</span></div>
                        <div className="flex gap-6 text-sm">
                            <a href="#benefits" className="hover:text-orange-500">会员权益</a>
                            <a href="#lab" className="hover:text-orange-500">AI 实验室</a>
                        </div>
                    </nav>

                    <header className="py-24 px-6 text-center">
                        <h1 className="text-6xl md:text-8xl font-black text-white mb-8 tracking-tight">煮茶论道，<br/><span className="text-orange-700">智赢全球</span></h1>
                        <p className="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed">
                            一个融合了非遗文化美学与现代出海技术的顶层社交圈层。
                        </p>
                    </header>

                    <section id="benefits" className="max-w-6xl mx-auto py-20 px-6 grid md:grid-cols-3 gap-8">
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🍵</div>
                            <h3 className="text-xl font-bold text-white mb-3">宋代点茶 · 非遗体验</h3>
                            <p className="text-sm text-gray-400 leading-loose">会员免费体验“七汤点茶”，在沫饽翻涌间领略宋式极致美学，学茶道，定心神。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🔪</div>
                            <h3 className="text-xl font-bold text-white mb-3">耀州窑刻花 · 手作</h3>
                            <p className="text-sm text-gray-400 leading-loose">非遗传承人亲自指导，在泥坯上勾勒宋纹，每一件刻花作品都是会员身份的徽章。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">💼</div>
                            <h3 className="text-xl font-bold text-white mb-3">生意对接 · 资源互关</h3>
                            <p className="text-sm text-gray-400 leading-loose">对接海内外优质生意项目，学习独立站建立与SEO优化。分享资源，精准匹配。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🃏</div>
                            <h3 className="text-xl font-bold text-white mb-3">掼蛋桌游 · 轻松社交</h3>
                            <p className="text-sm text-gray-400 leading-loose">免费提供专业桌游与掼蛋空间。在轻松对弈中，完成商务合作的初步碰撞。</p>
                        </div>
                        <div className="p-8 border border-white/5 bg-white/[0.02] hover:border-orange-700/50 transition-all">
                            <div className="text-orange-600 text-3xl mb-4">🚢</div>
                            <h3 className="text-xl font-bold text-white mb-3">共享运输 · 跨境出海</h3>
                            <p className="text-sm text-gray-400 leading-loose">共享云茗荟海外运输渠道，打破物流壁垒，为会员企业降本增效。</p>
                        </div>
                        <div className="p-8 gold-gradient flex flex-col justify-center items-center text-center">
                            <h3 className="text-2xl font-bold text-white mb-4">立即加入</h3>
                            <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" className="bg-white text-orange-900 px-6 py-2 font-bold rounded-full text-sm">联系主理人</a>
                        </div>
                    </section>

                    <section id="lab" className="max-w-4xl mx-auto py-32 px-6">
                        <div className="bg-zinc-900/50 border border-white/10 p-12 rounded-3xl text-center">
                            <h2 className="text-3xl font-bold text-white mb-6">AI 出海实验室</h2>
                            <div className="flex gap-2">
                                <input 
                                    className="flex-1 bg-black border border-white/10 p-4 outline-none focus:border-orange-700 text-white"
                                    placeholder="输入产品关键词..."
                                    value={product}
                                    onChange={(e) => setProduct(e.target.value)}
                                />
                                <button onClick={runAnalysis} className="bg-orange-700 px-8 font-bold text-white">
                                    {loading ? '分析中...' : '启动分析'}
                                </button>
                            </div>
                            {result && (
                                <div className="mt-8 text-left bg-black/40 p-6 border border-white/5">
                                    <p className="text-orange-500 font-bold tracking-widest text-xs mb-2 uppercase">分析结果</p>
                                    <p className="text-white text-lg">{result.demand || '已生成专业分析建议，详情请咨询会员专家。'}</p>
                                </div>
                            )}
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
