<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: sans-serif; }
        .gold-text { color: #c2410c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', textAlign: 'center' }}>
                    <h1 className="gold-text" style={{ fontSize: '3rem', fontWeight: 'bold' }}>云茗荟 YMTEA</h1>
                    <p style={{ color: '#666' }}>智赢全球 · 实验室已就绪</p>
                    <div style={{ marginTop: '20px', padding: '20px', border: '1px solid #333', borderRadius: '10px' }}>
                        <p>如果您看到这段文字，说明域名和 React 已经完美匹配！</p>
                        <a href="https://up.ymtea.club" style={{ color: '#c2410c', textDecoration: 'none' }}>进入行业分析 →</a>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
