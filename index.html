<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云茗荟 · 智赢全球 | YMTEA CLUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; height: 100%; }
        .glass-card:hover { border-color: rgba(194, 65, 12, 0.5); background: rgba(255, 255, 255, 0.05); transform: translateY(-5px); }
        .gold-gradient { background: linear-gradient(135deg, #c2410c 0%, #7c2d12 100%); }
        .history-gradient { background: linear-gradient(to bottom, transparent, rgba(194, 65, 12, 0.05), transparent); }
        .icon-box { color: #c2410c; margin-bottom: 1rem; }

        .sidebar-contact { position: fixed; right: 20px; bottom: 100px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item { position: relative; background: #c2410c; color: white; padding: 12px; border-radius: 50%; box-shadow: 0 10px 25px rgba(194, 65, 12, 0.5); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .sidebar-item::before { content: "加入会员咨询"; position: absolute; right: 55px; top: 50%; transform: translateY(-50%); background: #c2410c; color: white; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: tip-breath 2s infinite ease-in-out; }
        .sidebar-item::after { content: ""; position: absolute; right: 48px; top: 50%; transform: translateY(-50%); border-width: 6px; border-style: solid; border-color: transparent transparent transparent #c2410c; }

        @keyframes tip-breath { 0%, 100% { transform: translateY(-50%) translateX(0); opacity: 0.9; } 50% { transform: translateY(-50%) translateX(-5px); opacity: 1; } }
        @keyframes breath { 0%, 100% { box-shadow: 0 0 5px rgba(194, 65, 12, 0.2); transform: scale(1); } 50% { box-shadow: 0 0 20px rgba(194, 65, 12, 0.6); transform: scale(1.02); } }
        .animate-breath { animation: breath 2s infinite ease-in-out; background-color: #c2410c !important; color: white !important; }
        .qr-active { animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(194, 65, 12, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(194, 65, 12, 0); } 100% { box-shadow: 0 0 0 0 rgba(194, 65, 12, 0); } }
        #ticker { transition: all 0.5s ease-in-out; }
        .ai-content { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="sidebar-contact">
        <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" class="sidebar-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8"/><path d="M8 13h6"/></svg>
        </a>
    </div>

    <nav class="p-5 border-b border-white/10 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-sm z-50">
        <a href="https://ymtea.club" target="_blank" class="text-xl font-bold tracking-tighter text-white">云茗荟 <span class="text-orange-700">YMTEA</span></a>
        <div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
            <a href="https://ymtea.club/bbs" target="_blank" class="text-orange-600">论坛官网</a>
            <a href="https://en.ymtea.club" target="_blank" class="text-orange-600">深度创作</a>
            <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" class="hover:text-orange-600 text-gray-400 transition-colors">微信咨询</a>
        </div>
    </nav>

    <header class="py-16 px-6 text-center">
        <h1 class="text-4xl md:text-7xl font-bold mb-6 tracking-tight italic">以茶载道，<br/><span class="text-orange-700">智赢全球</span></h1>
        <p class="text-gray-300 text-lg md:text-xl max-w-xl mx-auto font-medium tracking-widest">“茗香社交，商道赋能”</p>
    </header>

    <section class="max-w-3xl mx-auto w-full px-6 mb-20">
        <div class="glass-card p-8 rounded-3xl text-center shadow-2xl border-orange-900/10">
            <div class="mb-2">
                <p class="text-orange-700/60 text-[10px] font-bold tracking-widest uppercase">“选品猎手 (Claude) 逻辑内核”</p>
                <h2 class="text-xs font-bold tracking-[0.3em] text-gray-500 uppercase">AI Market Intelligence Terminal</h2>
            </div>
            
            <div class="mb-6 h-6 overflow-hidden relative">
                <div id="ticker" class="text-[10px] text-orange-700/80 font-medium tracking-wider">
                    正在连接全球实时数据中心...
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <input id="productInput" class="flex-1 bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-orange-700 text-white transition-all" placeholder="输入出海产品关键词 (如: Tea Set)...">
                <button onclick="runAnalysis()" id="btn" class="bg-orange-700 px-8 py-4 rounded-xl font-bold hover:bg-orange-600 transition-all text-sm uppercase tracking-widest text-white">启动全球扫描</button>
            </div>
            
            <div id="resultBox" class="hidden mt-8 p-6 bg-white/5 rounded-2xl text-left border-l-4 border-orange-700 transition-all">
                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                    <h3 class="font-bold text-lg text-white" id="resTitle">扫描结果</h3>
                    <div id="resScore" class="text-2xl font-black text-orange-600">A+</div>
                </div>
                
                <div class="p-5 bg-black/60 rounded-xl border border-white/5 mb-8">
                    <p class="text-[10px] text-orange-700 font-bold uppercase mb-3 tracking-widest">硬核选品深度报告 (Amazon/TikTok/AliExpress)</p>
                    <div id="adviceContent" class="text-xs text-gray-400 ai-content leading-relaxed">
                        正在接收流式选品数据...
                    </div>
                </div>

                <div class="text-center">
                    <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" id="ctaBtn" class="inline-block bg-white text-black px-10 py-4 rounded-full font-bold text-[11px] uppercase tracking-widest transition-all">获取该品类完整出海方案 →</a>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 mb-20 text-center text-gray-500 text-[10px] uppercase tracking-widest">
        数据来源于全球选品猎手终端 · 实时更新
    </section>

    <footer class="py-20 border-t border-white/5 bg-black">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="flex justify-center flex-wrap gap-12 mb-12 text-[11px] font-bold uppercase tracking-[0.3em]">
                <a href="https://ymtea.club" class="text-gray-400 hover:text-orange-700 transition-colors">官网首页</a>
                <a href="https://en.ymtea.club" class="text-orange-700 underline">深度创作</a>
                <a href="https://ymtea.club/bbs" class="text-gray-400 hover:text-orange-700 transition-colors">云茗荟论坛</a>
            </div>
            <div class="text-[10px] text-gray-700 tracking-[0.4em] uppercase font-medium">© 2026 YMTEA LABS · 非遗承袭：大宋点茶 / 耀州窑 / 茶道</div>
        </div>
    </footer>

    <script>
        // 轮播文字逻辑
        const historyData = ["来自 深圳 的卖家 刚刚 获取了扫描报告", "来自 杭州 的卖家 5分钟前 下载了营销方案", "来自 佛山 的卖家 刚刚 开启了 GEO 扫描"];
        let historyIdx = 0;
        setInterval(() => {
            const ticker = document.getElementById('ticker');
            ticker.style.opacity = 0;
            setTimeout(() => {
                ticker.innerText = historyData[historyIdx];
                ticker.style.opacity = 1;
                historyIdx = (historyIdx + 1) % historyData.length;
            }, 500);
        }, 4000);

        // 核心：链接远程 Worker
        async function runAnalysis() {
            const val = document.getElementById('productInput').value;
            if(!val) return;
            
            const btn = document.getElementById('btn');
            const resultBox = document.getElementById('resultBox');
            const resTitle = document.getElementById('resTitle');
            const adviceContent = document.getElementById('adviceContent');
            const ctaBtn = document.getElementById('ctaBtn');
            
            btn.innerText = "同步全球实时数据...";
            btn.disabled = true;
            resultBox.classList.remove('hidden');
            resTitle.innerText = "正在扫描：" + val;
            adviceContent.innerText = "正在调用选品猎手 (Claude) 算法库进行数据对冲...";
            
            try {
                // 注意：由于 index 放在 v.ymtea.club，请求直接发给当前路径即可
                // 如果 index 和 Worker 不在同一个路径，请将下面 URL 改为 https://v.ymtea.club
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        topic: val, 
                        mode: 'hunter' 
                    })
                });

                if (!response.ok) throw new Error('Worker 连接失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let acc = "";
                adviceContent.innerText = ""; // 开始接收流式数据，清空提示

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.response) {
                                    acc += data.response;
                                    adviceContent.innerText = acc;
                                    // 自动滚动到结果区域
                                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                ctaBtn.classList.add('animate-breath');
                resTitle.innerText = "扫描完成：" + val;

            } catch (e) {
                adviceContent.innerText = "连接 Worker 终端超时。错误详情: " + e.message;
            } finally {
                btn.innerText = "重新扫描";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
